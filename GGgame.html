<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>GGame — Interactive Graphics Project</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  html, body { margin: 0; overflow: hidden; background: #000;
               font-family: monospace; color: #ffd9b0; }
  #hud { position: absolute; top: 12px; left: 14px; font-size: 14px;
         line-height: 1.6; text-shadow: 0 1px 3px #000; user-select: none; }

  /* ---- start screen: overlays the live Mars scene ---- */
  #menu { position: fixed; inset: 0; z-index: 10;
          display: flex; flex-direction: column;
          align-items: center; justify-content: center; gap: 28px;
          background: rgba(5, 9, 22, 0.72); backdrop-filter: blur(3px);
          user-select: none; }
  #menu h1 { margin: 0 24px; text-align: center;
             font-size: clamp(26px, 5vw, 54px); font-weight: bold;
             letter-spacing: 0.08em;
             color: #ffd9b0;
             text-shadow: 0 0 18px rgba(255, 170, 80, 0.55),
                          0 2px 4px #000; }
  /* bare glyph buttons: no box, no border — just the symbol */
  #menu button { font-family: monospace; cursor: pointer;
                 color: #ffd9b0; background: none; border: none;
                 padding: 6px 18px;
                 text-shadow: 0 0 14px rgba(255, 170, 80, 0.45);
                 transition: transform 0.15s, opacity 0.15s, text-shadow 0.15s; }
  #menu button:hover { transform: scale(1.18);
                       text-shadow: 0 0 22px rgba(255, 190, 100, 0.9); }
  #playBtn  { font-size: 58px; }
  #musicBtn { font-size: 44px; opacity: 0.45; }   /* dim = music off */
  #musicBtn.on { opacity: 1;                       /* bright = music on */
                 text-shadow: 0 0 22px rgba(255, 190, 100, 0.9); }
  /* the two glyphs side by side: play left, note right */
  #menu .buttons { display: flex; flex-direction: row;
                   align-items: center; gap: 46px; }
  /* signature pinned near the bottom of the screen, centred */
  #menu .brand { position: absolute; bottom: 26px; left: 50%;
                 transform: translateX(-50%);
                 font-size: 30px; font-weight: bold;
                 letter-spacing: 0.3em; opacity: 0.9;
                 text-shadow: 0 0 14px rgba(255, 170, 80, 0.5); }
  /* keyboard instructions: dashed box pinned to the bottom-left corner */
  #menu .hint { position: absolute; left: 22px; bottom: 22px;
                font-size: 13px; line-height: 1.7; opacity: 0.8;
                border: 2px dashed #ffd9b0; border-radius: 4px;
                padding: 12px 16px; }
</style>
</head>
<body>
  <!-- start screen: shown on load, removed by the PLAY button -->
  <div id="menu">
    <h1>Where No One Has Gone Before</h1>
    <div class="buttons">
      <button id="playBtn" title="play">&#9654;</button>
      <button id="musicBtn" title="music">&#9834;</button>
    </div>
    <div class="brand">GGame :)</div>
    <div class="hint">
      &#9664;&#9650;&#9660;&#9654; drive<br>
      1/2 tilt head · 9/0 pan head<br>
      C eye view · L lights<br>
      M music · R reset
    </div>
  </div>

  <div id="hud">
    ◀▲▼▶ drive &nbsp;·&nbsp; 1/2 tilt head &nbsp;·&nbsp; 9/0 pan head &nbsp;·&nbsp; C eye view &nbsp;·&nbsp; L lights &nbsp;·&nbsp; M music &nbsp;·&nbsp; R reset<br>
    <span id="info"></span>
  </div>
 
  <!-- 1. the Three.js library, r128 — LOCAL copy, as required: the repo
       must contain all the source code including the used libraries -->
  <script src="three.min.js"></script>
 
  <!-- 2. code: the whole project lives in GGame.js -->
  <script src="GGame.js"></script>
</body>
</html>
